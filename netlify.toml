[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Rewrite /api/* to the serverless function (URL stays /api/*; :splat preserves path)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# Scan tracking: /r/:id redirects to function (records scan, then redirects to target URL)
[[redirects]]
  from = "/r/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

# SPA: serve index.html for all other routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
